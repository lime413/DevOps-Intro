services:
  volume-init:
    image: busybox:1.37.0
    command: [ "sh", "-c", "mkdir -p /data && chown 65532:65532 /data" ]
    volumes:
      - quicknotes-data:/data
    restart: "no"

  quicknotes:
    build:
      context: ./app
    image: quicknotes:lab6
    depends_on:
      volume-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_PATH: /data/notes.json
      SEED_PATH: /seed.json
    volumes:
      - quicknotes-data:/data
    healthcheck:
      test: [ "CMD", "/healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  quicknotes-data:
