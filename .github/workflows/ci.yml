name: ci

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

env:
  GOFLAGS: -buildvcs=false
  GOLANGCI_LINT_VERSION: v2.5.0

jobs:
  vet:
    name: vet (go ${{ matrix.go-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.23", "1.24"]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: app/go.mod
      - run: go vet ./...

  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.23", "1.24"]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: app/go.mod
      - run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: app/go.mod
      - id: golangci-lint-binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/go/bin/golangci-lint
          key: ${{ runner.os }}-go-1.24-golangci-lint-${{ env.GOLANGCI_LINT_VERSION }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-cache-${{ env.GOLANGCI_LINT_VERSION }}-${{ hashFiles('app/.golangci.yml', 'app/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-golangci-cache-${{ env.GOLANGCI_LINT_VERSION }}-
      - if: steps.golangci-lint-binary.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
      - run: '"$(go env GOPATH)/bin/golangci-lint" run'
